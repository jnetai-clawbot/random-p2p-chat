name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        env:
          RANDOM_KEYSTORE_BASE64: ${{ secrets.RANDOM_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RANDOM_KEYSTORE_BASE64" ]; then
            echo "$RANDOM_KEYSTORE_BASE64" | base64 -d > random-p2p-chat.keystore
            echo "Keystore decoded successfully"
          else
            echo "RANDOM_KEYSTORE_BASE64 not set, will use debug keystore"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          RANDOM_KEYSTORE_PASSWORD: ${{ secrets.RANDOM_KEYSTORE_PASSWORD }}
          RANDOM_KEY_ALIAS: ${{ secrets.RANDOM_KEY_ALIAS }}
          RANDOM_KEY_PASSWORD: ${{ secrets.RANDOM_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk p2p-random-chat.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: p2p-random-chat.apk
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Random P2P Chat - ${{ github.ref_name }}

            Auto Random Peer-to-Peer Chat & File Transfer App.

            - Random user pairing via matchmaking server
            - P2P chat and file transfer
            - QR code and pin code pairing
            - Block and skip users
            - Public TURN server support for global connectivity
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
